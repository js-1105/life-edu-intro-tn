<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>單元一 · 分組投稿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<script src="fbconfig.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--c:#862633}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Noto Sans TC","PingFang TC",sans-serif;background:#FAF7F2;color:#1A1A1A;line-height:1.6;padding:env(safe-area-inset-top) 0 2em}
.bar{background:var(--c);color:#fff;padding:1.1em 1.1em;position:sticky;top:0;z-index:10;box-shadow:0 3px 14px rgba(0,0,0,.18)}
.bar .g{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.5rem;letter-spacing:.03em}
.bar .s{font-size:.85rem;opacity:.9;margin-top:.15em}
.wrap{max-width:640px;margin:0 auto;padding:1em 1.1em}
.intro{color:#6B6B6B;font-size:.95rem;margin:.2em 0 1.2em}
.blk{background:#fff;border-radius:16px;box-shadow:0 4px 18px rgba(134,38,51,.08);border-top:5px solid var(--c);padding:1.1em 1.1em 1.2em;margin-bottom:1.3em}
.blk.kun{border-top-color:#5C1A23}
label{display:block;font-family:"Noto Serif TC",serif;font-weight:700;font-size:1.18rem;color:var(--c);margin-bottom:.5em}
.blk.kun label{color:#5C1A23}
textarea{width:100%;font-family:inherit;font-size:1.08rem;line-height:1.6;padding:.7em .8em;border:2px solid #E5DDD0;border-radius:12px;background:#fffdf9;resize:vertical;min-height:6.5em}
textarea:focus{outline:none;border-color:var(--c)}
button.send{margin-top:.7em;width:100%;background:var(--c);color:#fff;border:none;border-radius:999px;padding:.85em;font-size:1.1rem;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.05em}
.blk.kun button.send{background:#5C1A23}
button.send:active{transform:translateY(1px);opacity:.9}
.list{margin-top:1em;display:flex;flex-direction:column;gap:.55em}
.item{background:#FBF6E8;border-left:4px solid var(--c);border-radius:8px;padding:.6em .8em;font-size:1rem;white-space:pre-wrap;position:relative}
.blk.kun .item{background:#FFF8D8;border-left-color:#5C1A23}
.item .del{position:absolute;top:.3em;right:.5em;color:#b08;opacity:.5;font-size:.8rem;background:none;border:none;cursor:pointer}
.empty{color:#9a8f7d;font-style:italic;font-size:.95rem}
.foot{text-align:center;color:#6B6B6B;font-size:.85rem;margin-top:.5em;padding:0 1em}
.flash{position:fixed;left:50%;bottom:1.5em;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.85);color:#fff;padding:.6em 1.4em;border-radius:999px;font-size:1rem;opacity:0;transition:.3s;z-index:50;pointer-events:none}
.flash.show{opacity:1;transform:translateX(-50%) translateY(0)}
.blk.rel{border-top-color:#6B5635}
.blk.rel label{color:#6B5635}
.blk.rel button.send{background:#6B5635}
.blk.rel .item{background:#F3EEE0;border-left-color:#6B5635}
select{width:100%;font-family:inherit;font-size:1.08rem;padding:.7em .8em;border:2px solid #E5DDD0;border-radius:12px;background:#fffdf9;margin-bottom:.6em}
select:focus{outline:none;border-color:var(--c)}
input.one{width:100%;font-family:inherit;font-size:1.08rem;padding:.7em .8em;border:2px solid #E5DDD0;border-radius:12px;background:#fffdf9}
input.one:focus{outline:none;border-color:var(--c)}
.hint{font-size:.88rem;color:#8a7f6d;margin-top:.4em;display:flex;justify-content:space-between;gap:.6em}
.hint .cnt{font-variant-numeric:tabular-nums}
.hint .cnt.over{color:#b0304a;font-weight:700}
.pickbar{background:#fff;border-radius:16px;box-shadow:0 4px 18px rgba(134,38,51,.08);border-top:5px solid var(--c);padding:1.1em;margin-bottom:1.3em}
.pickbar label{margin-bottom:.4em}
.tag{display:inline-block;background:#EFE6D2;color:#5C1A23;border-radius:999px;padding:.15em .7em;font-size:.85rem;margin-left:.4em}
</style>
</head>
<body>
<div class="bar"><div class="g" id="gName">第 ? 組</div><div class="s" id="gSub">把你們的討論打上來</div></div>
<div class="wrap">
  <p class="intro">依序送出三樣東西，都會即時出現在投影幕：<b>①理解</b>→你們那一組的頁面；<b>②內涵的疑問</b>→素養地圖你們素養的圈圈裡；<b>③關係的疑問</b>→點亮兩素養間的連線。②③字數不限，但地圖只秀前 20 字——先寫重點，再展開。</p>
  <div class="pickbar" id="pickBar" style="display:none">
    <label>任意門：你們要深入哪一個核心素養？（先選，才能投稿；投影幕會顯示你們的選擇）</label>
    <select id="pickSel"><option value="">請選擇…</option></select>
  </div>
  <section class="blk">
    <label>① 我們對這個核心素養的「理解」</label>
    <textarea id="lijie" placeholder="這個核心素養到底在問什麼、核心是什麼？把你們收斂出的理解寫在這裡…"></textarea>
    <button class="send" onclick="send('lijie')">送出「理解」</button>
    <div class="list" id="lijieList"></div>
  </section>
  <section class="blk kun">
    <label>② 對這個素養的「內涵」還有什麼不懂</label>
    <textarea id="kunhuo" placeholder="開頭一句先寫重點，之後再詳細展開…"></textarea>
    <div class="hint"><span>字數不限、盡情寫。投影幕的素養地圖只會秀<b>前 20 字</b>——請開宗明義先寫重點，再詳細展開。</span></div>
    <button class="send" onclick="send('kunhuo')">送出「內涵的疑問」</button>
    <div class="list" id="kunhuoList"></div>
  </section>
  <section class="blk rel">
    <label>③ 這個素養和「哪一個素養」的關係還接不起來</label>
    <select id="relTgt"><option value="">先選一個素養…</option></select>
    <textarea id="guanxi" placeholder="例：和價值思辨如何相連，說不上來——之後再詳細展開…"></textarea>
    <div class="hint"><span>以<b>「和◯◯…」起頭</b>寫出關係哪裡不明白；字數不限，地圖只秀<b>前 20 字</b>——先寫重點，再展開。會點亮兩素養間的連線。</span></div>
    <button class="send" onclick="send('guanxi')">送出「關係的疑問」</button>
    <div class="list" id="guanxiList"></div>
  </section>
  <p class="foot" id="foot">連線中…</p>
</div>
<div class="flash" id="flash"></div>
<script>
(function(){
  var GROUPS={1:{n:'終極關懷',c:'#862633'},2:{n:'價值思辨',c:'#A8782E'},3:{n:'靈性修養',c:'#A23A48'},4:{n:'人學探索',c:'#6B5635'},5:{n:'哲學思考',c:'#5C1A23'},6:{n:'任意門',c:'#1A1A1A'}};
  var g=(new URLSearchParams(location.search).get('g')||'1').replace(/[^1-6]/g,'')||'1';
  var G=GROUPS[g];
  document.documentElement.style.setProperty('--c',G.c);
  document.getElementById('gName').textContent='第 '+g+' 組 · '+G.n;
  document.getElementById('gSub').textContent='你們負責的核心素養：'+G.n;
  document.title='第'+g+'組 '+G.n+' · 投稿';
  function esc(s){return String(s||'').replace(/[&<>]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];});}
  // 第6組自選一個核心素養；其餘組別即為自己的素養
  var PICK=null;                                   // 第6組所選素養 id（字串 '1'~'5'）
  function ownId(){return g==='6'?PICK:g;}
  function ownName(){var o=ownId();return o?GROUPS[o].n:'（尚未選擇）';}
  function fillSel(sel,skip,ph){
    sel.innerHTML='<option value="">'+ph+'</option>'+[1,2,3,4,5].filter(function(i){return String(i)!==String(skip);})
      .map(function(i){return '<option value="'+i+'">'+GROUPS[i].n+'</option>';}).join('');
  }
  function syncHead(){
    var o=ownId();
    if(g==='6'){
      document.getElementById('gName').textContent='第 6 組 · 任意門';
      document.getElementById('gSub').textContent=o?('你們選的核心素養：'+GROUPS[o].n):'請先在下方選一個核心素養';
      if(o)document.documentElement.style.setProperty('--c',GROUPS[o].c);
    }
    fillSel(document.getElementById('relTgt'),o,o?'和哪一個素養的關係？':'請先選定你們的素養');
  }
  function configured(){return window.FB_CONFIG&&FB_CONFIG.apiKey&&FB_CONFIG.apiKey.indexOf('PASTE')<0;}
  function listify(o){if(!o)return[];return Object.keys(o).sort(function(a,b){return (o[a].t||0)-(o[b].t||0);}).map(function(k){return {k:k,txt:o[k].txt,tgt:o[k].tgt};});}
  var DB=null, foot=document.getElementById('foot');
  function flash(t){var f=document.getElementById('flash');f.textContent=t;f.classList.add('show');setTimeout(function(){f.classList.remove('show');},1400);}
  var EMPTY={lijie:'還沒送出理解。',kunhuo:'還沒送出內涵的疑問。',guanxi:'還沒送出關係的疑問。'};
  function render(type,arr){
    var box=document.getElementById(type+'List'); if(!box)return;
    if(!arr||!arr.length){box.innerHTML='<div class="empty">'+EMPTY[type]+'</div>';return;}
    box.innerHTML=arr.map(function(o){
      var del=DB?'<button class="del" data-type="'+type+'" data-k="'+o.k+'">刪</button>':'';
      var tag=o.tgt&&GROUPS[o.tgt]?'<span class="tag">↔ '+GROUPS[o.tgt].n+'</span>':'';
      return '<div class="item">'+esc(o.txt)+tag+del+'</div>';
    }).join('');
  }
  ['lijieList','kunhuoList','guanxiList'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('click',function(e){
      var b=e.target.closest&&e.target.closest('.del'); if(!b||!DB)return;
      DB.child(b.getAttribute('data-type')+'/'+b.getAttribute('data-k')).remove();
    });
  });
  window.send=function(type){
    if(g==='6'&&!PICK){flash('請先選一個核心素養');return;}
    var ta=document.getElementById(type);var txt=(ta.value||'').trim();if(!txt){flash('先寫點東西再送出');return;}
    var tgt=null;
    if(type==='guanxi'){
      tgt=document.getElementById('relTgt').value;
      if(!tgt){flash('請先選「和哪一個素養」');return;}
    }
    if(!DB){flash('尚未連線，請稍候再送出');return;}
    var o={txt:txt,t:Date.now()};if(tgt)o.tgt=tgt;DB.child(type).push(o);
    ta.value='';updCnt();flash('已送出！');
  };
  // 字數計數
  function updCnt(){
    [['kunhuo','kunCnt'],['guanxi','relCnt']].forEach(function(pair){
      var inp=document.getElementById(pair[0]),el=document.getElementById(pair[1]);
      if(!inp||!el)return;
      var n=(inp.value||'').length; el.textContent=n+'／20'; el.classList.toggle('over',n>=20);
    });
  }

  // 第6組：顯示素養選擇器
  if(g==='6'){
    var bar=document.getElementById('pickBar'); bar.style.display='';
    var psel=document.getElementById('pickSel');
    fillSel(psel,null,'請選擇…');
    psel.addEventListener('change',function(){
      PICK=psel.value||null;
      if(DB)DB.child('pick').set(PICK);
      syncHead();
    });
  }
  syncHead();
  updCnt();
  if(configured()&&typeof firebase!=='undefined'){
    try{
      firebase.initializeApp(window.FB_CONFIG);
      DB=firebase.database().ref('rooms/'+(window.FB_ROOM||'default')+'/g'+g);
      DB.on('value',function(snap){
        var v=snap.val()||{};
        if(g==='6'){
          var np=v.pick||null;
          if(np!==PICK){PICK=np;var ps=document.getElementById('pickSel');if(ps)ps.value=PICK||'';syncHead();}
        }
        render('lijie',listify(v.lijie));render('kunhuo',listify(v.kunhuo));render('guanxi',listify(v.guanxi));
      });
      foot.textContent='● 已連線（房號 '+(window.FB_ROOM||'default')+'）—— 送出後投影幕即時更新';
    }catch(e){foot.textContent='⚠ 連線失敗：'+e.message+'（請確認網路後重新整理）';}
  } else {
    foot.textContent='⚠ 尚未設定連線，請通知老師';
  }
})();
</script>
</body>
</html>
